<svg width="100%" viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg" role="img">
<title>AgentOS architecture</title>
<desc>Single Ring-0 address space containing Boot-LLM, Validator, and Sandboxes connected via Zero-Copy Handle IPC, sitting on a HAL with native x86_64 and aarch64 implementations on bare metal</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<style>
.t-th { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; font-weight: 500; }
.t-ts { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 12px; }
.coral-fill { fill: #FAECE7; stroke: #993C1D; }
.purple-fill { fill: #EEEDFE; stroke: #534AB7; }
.teal-fill { fill: #E1F5EE; stroke: #0F6E56; }
.gray-fill { fill: #F1EFE8; stroke: #888780; }
@media (prefers-color-scheme: dark) {
.coral-fill { fill: #4A1B0C; stroke: #F5C4B3; }
.purple-fill { fill: #26215C; stroke: #AFA9EC; }
.teal-fill { fill: #04342C; stroke: #5DCAA5; }
.gray-fill { fill: #2C2C2A; stroke: #B4B2A9; }
.dark-text { fill: #F5C4B3 !important; }
.dark-text-purple { fill: #AFA9EC !important; }
.dark-text-teal { fill: #5DCAA5 !important; }
.dark-text-gray { fill: #F1EFE8 !important; }
.muted { fill: #888780 !important; }
}
</style>
</defs>
<rect x="40" y="20" width="600" height="280" rx="12" fill="none" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 4"/>
<text class="t-ts" x="56" y="42" fill="#888780" style="font-weight: 500;">AgentOS — single Ring-0 address space</text>
<rect x="60" y="64" width="170" height="76" rx="8" class="coral-fill" stroke-width="0.5"/>
<text class="t-th" x="145" y="92" text-anchor="middle" fill="#4A1B0C">Boot-LLM</text>
<text class="t-ts" x="145" y="112" text-anchor="middle" fill="#712B13">Qwen3 1.7B</text>
<text class="t-ts" x="145" y="128" text-anchor="middle" fill="#712B13">Ring-0 inference</text>
<rect x="255" y="64" width="170" height="76" rx="8" class="purple-fill" stroke-width="0.5"/>
<text class="t-th" x="340" y="92" text-anchor="middle" fill="#26215C">Validator</text>
<text class="t-ts" x="340" y="112" text-anchor="middle" fill="#3C3489">Type-safety</text>
<text class="t-ts" x="340" y="128" text-anchor="middle" fill="#3C3489">Capability checks</text>
<rect x="450" y="64" width="170" height="76" rx="8" class="teal-fill" stroke-width="0.5"/>
<text class="t-th" x="535" y="92" text-anchor="middle" fill="#04342C">Sandboxes</text>
<text class="t-ts" x="535" y="112" text-anchor="middle" fill="#085041">Capability-typed</text>
<text class="t-ts" x="535" y="128" text-anchor="middle" fill="#085041">Per-agent arenas</text>
<line x1="230" y1="102" x2="255" y2="102" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="255" y1="108" x2="230" y2="108" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="425" y1="102" x2="450" y2="102" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="450" y1="108" x2="425" y2="108" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="t-ts" x="340" y="170" text-anchor="middle" fill="#888780">Zero-Copy Handle IPC — no syscalls, no serialization</text>
<line x1="60" y1="186" x2="620" y2="186" stroke="#D3D1C7" stroke-width="0.5"/>
<rect x="60" y="206" width="560" height="76" rx="8" fill="none" stroke="#888780" stroke-width="0.5"/>
<text class="t-ts" x="80" y="226" fill="#888780" style="font-weight: 500;">HAL — platform-native implementations</text>
<rect x="80" y="236" width="260" height="36" rx="6" class="gray-fill" stroke-width="0.5"/>
<text class="t-th" x="100" y="259" fill="#2C2C2A">x86_64</text>
<text class="t-ts" x="160" y="259" fill="#5F5E5A">PML4 · GDT · IDT · APIC</text>
<rect x="350" y="236" width="260" height="36" rx="6" class="gray-fill" stroke-width="0.5"/>
<text class="t-th" x="370" y="259" fill="#2C2C2A">aarch64</text>
<text class="t-ts" x="430" y="259" fill="#5F5E5A">TTBR1 · GIC · Timer · PL011</text>
<line x1="40" y1="320" x2="640" y2="320" stroke="#888780" stroke-width="1" stroke-dasharray="2 4"/>
<text class="t-ts" x="340" y="350" text-anchor="middle" fill="#888780" style="font-weight: 500; letter-spacing: 2px;">BARE METAL</text>
<text class="t-ts" x="340" y="372" text-anchor="middle" fill="#888780">No host OS · No hypervisor · No syscalls · No process boundaries</text>
<g transform="translate(40, 410)">
<circle cx="6" cy="6" r="4" fill="#993C1D"/>
<text class="t-ts" x="18" y="10" fill="#5F5E5A">Inference engine</text>
<circle cx="180" cy="6" r="4" fill="#534AB7"/>
<text class="t-ts" x="192" y="10" fill="#5F5E5A">Safety layer</text>
<circle cx="320" cy="6" r="4" fill="#0F6E56"/>
<text class="t-ts" x="332" y="10" fill="#5F5E5A">Agent runtime</text>
<circle cx="460" cy="6" r="4" fill="#888780"/>
<text class="t-ts" x="472" y="10" fill="#5F5E5A">Hardware abstraction</text>
</g>
</svg>
