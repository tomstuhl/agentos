<svg width="100%" viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg" role="img">
<title>AgentOS hero banner</title>
<desc>Concentric rings showing classical CPU privilege levels with Ring 0 highlighted as containing everything in AgentOS</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<style>
.t-primary { fill: #2C2C2A; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
.t-secondary { fill: #5F5E5A; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 12px; }
.t-muted { fill: #888780; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 12px; }
.t-coral-dark { fill: #4A1B0C; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
.t-coral-mid { fill: #712B13; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 12px; }
@media (prefers-color-scheme: dark) {
.t-primary { fill: #F1EFE8; }
.t-secondary { fill: #B4B2A9; }
.t-muted { fill: #888780; }
.t-coral-dark { fill: #FAECE7; }
.t-coral-mid { fill: #F5C4B3; }
}
</style>
</defs>
<text class="t-primary" x="40" y="50" style="font-size: 28px; font-weight: 500; letter-spacing: -0.5px;">AgentOS</text>
<text class="t-secondary" x="40" y="78" style="font-size: 14px;">The first native Ring-0 Operating System for the AI era</text>
<circle cx="220" cy="220" r="120" fill="none" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="4 4"/>
<circle cx="220" cy="220" r="92" fill="none" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="4 4"/>
<circle cx="220" cy="220" r="64" fill="none" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="4 4"/>
<circle cx="220" cy="220" r="36" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text class="t-coral-dark" x="220" y="225" text-anchor="middle" style="font-size: 14px; font-weight: 500;">Ring 0</text>
<text class="t-muted" x="220" y="115" text-anchor="middle">Ring 3 — empty</text>
<text class="t-muted" x="220" y="143" text-anchor="middle">Ring 2 — empty</text>
<text class="t-muted" x="220" y="171" text-anchor="middle">Ring 1 — empty</text>
<line x1="280" y1="220" x2="380" y2="220" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="t-muted" x="330" y="212" text-anchor="middle">contains</text>
<rect x="395" y="148" width="240" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="t-coral-dark" x="515" y="170" text-anchor="middle" style="font-size: 14px; font-weight: 500;">Boot-LLM</text>
<text class="t-coral-mid" x="515" y="186" text-anchor="middle">1.7B parameters, bare metal</text>
<rect x="395" y="200" width="240" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="t-coral-dark" x="515" y="222" text-anchor="middle" style="font-size: 14px; font-weight: 500;">Validator</text>
<text class="t-coral-mid" x="515" y="238" text-anchor="middle">Type-safety as the only law</text>
<rect x="395" y="252" width="240" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="t-coral-dark" x="515" y="274" text-anchor="middle" style="font-size: 14px; font-weight: 500;">Sandboxes</text>
<text class="t-coral-mid" x="515" y="290" text-anchor="middle">Capability-typed handles</text>
<text class="t-muted" x="40" y="335">Bare metal. No host OS. No hypervisor. One address space.</text>
</svg>
