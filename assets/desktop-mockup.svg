<text class="t-mono-primary" x="138" y="174" style="font-size: 11px; font-weight: 500;"># Notes on agent throughput</text>
<text class="t-mono" x="138" y="194" style="font-size: 11px;">Ring-0 inference reduces context-switch overhead by ~94%</text>
<text class="t-mono" x="138" y="212" style="font-size: 11px;">compared to user-space inference servers. The validator</text>
<text class="t-mono" x="138" y="230" style="font-size: 11px;">gates every agent operation in </text>
<text class="t-green" x="316" y="230" style="font-size: 11px; font-family: ui-monospace, monospace;">O(1)</text>
<text class="t-mono" x="345" y="230" style="font-size: 11px;"> against capability tables.</text>
<text class="t-mono" x="138" y="258" style="font-size: 11px; opacity: 0.7;">## Open questions</text>
<text class="t-mono" x="138" y="278" style="font-size: 11px;">- Token throughput at 16-agent concurrency?</text>
<text class="t-mono" x="138" y="296" style="font-size: 11px;">- Memory bandwidth ceiling on Apple Silicon?</text>
