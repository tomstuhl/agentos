<svg width="100%" viewBox="0 0 680 880" xmlns="http://www.w3.org/2000/svg" role="img">
<title>AgentOS roadmap timeline</title>
<desc>Roadmap from Stage 11 Boot-LLM through Stage 24+ Pure-AgentLang Kernel</desc>
<defs>
<style>
.t-th { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; font-weight: 500; }
.t-ts { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 12px; }
.green-fill { fill: #EAF3DE; stroke: #639922; }
.coral-fill { fill: #FAECE7; stroke: #993C1D; }
.gray-fill { fill: #F1EFE8; stroke: #888780; }
.purple-fill { fill: #EEEDFE; stroke: #534AB7; }
@media (prefers-color-scheme: dark) {
.green-fill { fill: #173404; stroke: #C0DD97; }
.coral-fill { fill: #4A1B0C; stroke: #F5C4B3; }
.gray-fill { fill: #2C2C2A; stroke: #B4B2A9; }
.purple-fill { fill: #26215C; stroke: #AFA9EC; }
}
</style>
</defs>
<text class="t-ts" x="40" y="36" fill="#888780" style="font-size: 11px; letter-spacing: 1px; font-weight: 500;">THE LONG ARC</text>
<text class="t-th" x="40" y="62" fill="#2C2C2A" style="font-size: 16px; font-weight: 500;">From bare metal LLM to the pure-AgentLang kernel.</text>
<text class="t-ts" x="40" y="82" fill="#5F5E5A">Eight milestones. One coherent journey.</text>
<text class="t-ts" x="40" y="118" fill="#888780" style="font-size: 10px; letter-spacing: 1px; font-weight: 500;">TODAY</text>
<line x1="84" y1="114" x2="640" y2="114" stroke="#D3D1C7" stroke-width="0.5"/>
<rect x="40" y="140" width="290" height="120" rx="10" class="green-fill" stroke-width="0.5"/>
<text class="t-ts" x="60" y="164" fill="#3B6D11" style="letter-spacing: 1px; font-weight: 500;">STAGE 11</text>
<text class="t-ts" x="270" y="164" text-anchor="end" fill="#3B6D11" style="letter-spacing: 0.5px; font-weight: 500;">DONE</text>
<line x1="60" y1="174" x2="310" y2="174" stroke="#639922" stroke-width="0.5" stroke-dasharray="2 3"/>
<text class="t-th" x="60" y="200" fill="#173404" style="font-size: 16px; font-weight: 500;">Boot-LLM operational</text>
<text class="t-ts" x="60" y="222" fill="#3B6D11">1.7B parameters loaded into Ring-0</text>
<text class="t-ts" x="60" y="238" fill="#3B6D11">arena, executing on bare metal,</text>
<text class="t-ts" x="60" y="254" fill="#3B6D11">cross-platform deterministic.</text>
<rect x="350" y="140" width="290" height="120" rx="10" class="coral-fill" stroke-width="1"/>
<text class="t-ts" x="370" y="164" fill="#993C1D" style="letter-spacing: 1px; font-weight: 500;">STAGE 11 CLOSURE</text>
<text class="t-ts" x="620" y="164" text-anchor="end" fill="#993C1D" style="letter-spacing: 0.5px; font-weight: 500;">ACTIVE</text>
<line x1="370" y1="174" x2="620" y2="174" stroke="#D85A30" stroke-width="0.5" stroke-dasharray="2 3"/>
<text class="t-th" x="370" y="200" fill="#4A1B0C" style="font-size: 16px; font-weight: 500;">First AI sentence</text>
<text class="t-ts" x="370" y="222" fill="#712B13">"Hello World... I'm the first AI"</text>
<text class="t-ts" x="370" y="238" fill="#712B13">rendered on bare metal serial,</text>
<text class="t-ts" x="370" y="254" fill="#712B13">both architectures, bit-exact.</text>
<rect x="40" y="280" width="290" height="120" rx="10" class="gray-fill" stroke-width="0.5"/>
<text class="t-ts" x="60" y="304" fill="#5F5E5A" style="letter-spacing: 1px; font-weight: 500;">STAGE 12</text>
<text class="t-ts" x="310" y="304" text-anchor="end" fill="#888780" style="letter-spacing: 0.5px; font-weight: 500;">NEXT</text>
<line x1="60" y1="314" x2="310" y2="314" stroke="#888780" stroke-width="0.5" stroke-dasharray="2 3"/>
<text class="t-th" x="60" y="340" fill="#2C2C2A" style="font-size: 16px; font-weight: 500;">Sandboxing + Migration</text>
<text class="t-ts" x="60" y="362" fill="#5F5E5A">Capability-typed sandboxes, plus</text>
<text class="t-ts" x="60" y="378" fill="#5F5E5A">first AgentLang-native subsystem.</text>
<text class="t-ts" x="60" y="394" fill="#5F5E5A">The Rust detour begins to recede.</text>
<rect x="350" y="280" width="290" height="120" rx="10" class="gray-fill" stroke-width="0.5"/>
<text class="t-ts" x="370" y="304" fill="#5F5E5A" style="letter-spacing: 1px; font-weight: 500;">STAGE 13</text>
<text class="t-ts" x="620" y="304" text-anchor="end" fill="#888780" style="letter-spacing: 0.5px; font-weight: 500;">FORTHCOMING</text>
<line x1="370" y1="314" x2="620" y2="314" stroke="#888780" stroke-width="0.5" stroke-dasharray="2 3"/>
<text class="t-th" x="370" y="340" fill="#2C2C2A" style="font-size: 16px; font-weight: 500;">MCP Integration</text>
<text class="t-ts" x="370" y="362" fill="#5F5E5A">External AI agents connect to</text>
<text class="t-ts" x="370" y="378" fill="#5F5E5A">AgentOS sandboxes via the</text>
<text class="t-ts" x="370" y="394" fill="#5F5E5A">Model Context Protocol.</text>
<rect x="40" y="420" width="290" height="120" rx="10" class="gray-fill" stroke-width="0.5"/>
<text class="t-ts" x="60" y="444" fill="#5F5E5A" style="letter-spacing: 1px; font-weight: 500;">STAGE 14</text>
<text class="t-ts" x="310" y="444" text-anchor="end" fill="#888780" style="letter-spacing: 0.5px; font-weight: 500;">FORTHCOMING</text>
<line x1="60" y1="454" x2="310" y2="454" stroke="#888780" stroke-width="0.5" stroke-dasharray="2 3"/>
<text class="t-th" x="60" y="480" fill="#2C2C2A" style="font-size: 16px; font-weight: 500;">Dual Desktop</text>
<text class="t-ts" x="60" y="502" fill="#5F5E5A">Classical user desktop alongside</text>
<text class="t-ts" x="60" y="518" fill="#5F5E5A">the Agent Desktop with live</text>
<text class="t-ts" x="60" y="534" fill="#5F5E5A">agent visualization.</text>
<rect x="350" y="420" width="290" height="120" rx="10" class="gray-fill" stroke-width="0.5"/>
<text class="t-ts" x="370" y="444" fill="#5F5E5A" style="letter-spacing: 1px; font-weight: 500;">STAGE 16</text>
<text class="t-ts" x="620" y="444" text-anchor="end" fill="#888780" style="letter-spacing: 0.5px; font-weight: 500;">FORTHCOMING</text>
<line x1="370" y1="454" x2="620" y2="454" stroke="#888780" stroke-width="0.5" stroke-dasharray="2 3"/>
<text class="t-th" x="370" y="480" fill="#2C2C2A" style="font-size: 16px; font-weight: 500;">VM-Hosting</text>
<text class="t-ts" x="370" y="502" fill="#5F5E5A">Linux and Windows as guests</text>
<text class="t-ts" x="370" y="518" fill="#5F5E5A">inside AgentOS — adoption</text>
<text class="t-ts" x="370" y="534" fill="#5F5E5A">without abandonment.</text>
<rect x="40" y="560" width="290" height="120" rx="10" class="gray-fill" stroke-width="0.5"/>
<text class="t-ts" x="60" y="584" fill="#5F5E5A" style="letter-spacing: 1px; font-weight: 500;">STAGE 17 +</text>
<text class="t-ts" x="310" y="584" text-anchor="end" fill="#888780" style="letter-spacing: 0.5px; font-weight: 500;">FORTHCOMING</text>
<line x1="60" y1="594" x2="310" y2="594" stroke="#888780" stroke-width="0.5" stroke-dasharray="2 3"/>
<text class="t-th" x="60" y="620" fill="#2C2C2A" style="font-size: 16px; font-weight: 500;">Mature platform</text>
<text class="t-ts" x="60" y="642" fill="#5F5E5A">LLM-Management UI, hot-swap,</text>
<text class="t-ts" x="60" y="658" fill="#5F5E5A">sandbox-to-host promotion,</text>
<text class="t-ts" x="60" y="674" fill="#5F5E5A">native LLM training.</text>
<rect x="350" y="560" width="290" height="120" rx="10" class="purple-fill" stroke-width="1"/>
<text class="t-ts" x="370" y="584" fill="#3C3489" style="letter-spacing: 1px; font-weight: 500;">STAGE 24 +</text>
<text class="t-ts" x="620" y="584" text-anchor="end" fill="#3C3489" style="letter-spacing: 0.5px; font-weight: 500;">END-STATE</text>
<line x1="370" y1="594" x2="620" y2="594" stroke="#534AB7" stroke-width="0.5" stroke-dasharray="2 3"/>
<text class="t-th" x="370" y="620" fill="#26215C" style="font-size: 16px; font-weight: 500;">Pure-AgentLang kernel</text>
<text class="t-ts" x="370" y="642" fill="#3C3489">Zero Rust. Zero compatibility</text>
<text class="t-ts" x="370" y="658" fill="#3C3489">shims. Zero legacy. Validated</text>
<text class="t-ts" x="370" y="674" fill="#3C3489">end-to-end by the type system.</text>
<line x1="40" y1="720" x2="640" y2="720" stroke="#D3D1C7" stroke-width="0.5"/>
<rect x="40" y="740" width="14" height="14" rx="3" class="green-fill" stroke-width="0.5"/>
<text class="t-ts" x="62" y="751" fill="#5F5E5A">Done</text>
<rect x="120" y="740" width="14" height="14" rx="3" class="coral-fill" stroke-width="1"/>
<text class="t-ts" x="142" y="751" fill="#5F5E5A">Active</text>
<rect x="210" y="740" width="14" height="14" rx="3" class="gray-fill" stroke-width="0.5"/>
<text class="t-ts" x="232" y="751" fill="#5F5E5A">Forthcoming</text>
<rect x="330" y="740" width="14" height="14" rx="3" class="purple-fill" stroke-width="1"/>
<text class="t-ts" x="352" y="751" fill="#5F5E5A">End-state</text>
<text class="t-ts" x="40" y="800" fill="#888780" style="font-size: 11px;">We do not build fast. We build correctly. The discipline that delivered Stage 11</text>
<text class="t-ts" x="40" y="816" fill="#888780" style="font-size: 11px;">with zero reverts is the discipline that gets us to Stage 24.</text>
</svg>
